<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrolling Story</title>

<style>
    body {
        margin: 0;
        background-color: black;
    }

    .section {
        width: 100%;
        height: 100vh;
        position: relative;
    }

    .section img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* shows full image */
        display: block;
        background-color: black;
    }
</style>
</head>

<body>

<div class="section">
    <img src="photos/pt1.png">
</div>

<div class="section">
    <img src="photos/pt2.png">
</div>

<div class="section">
    <img src="photos/pt3.png">
</div>

<div class="section">
    <img src="photos/pt4.png">
</div>

<div class="section">
    <img src="photos/pt5.png">
</div>

<div class="section">
    <img src="photos/pt6.png">
</div>

<!-- Last section with clickable logo -->
<div class="section" style="position: relative;">

    <img src="photos/pt7.png">

    <a href="https://ift.tt/snliN5j" target="_blank">
        <img src="photos/logo.png" 
             style="
                position: absolute;
                top: 35%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 200px;
                cursor: pointer;
             ">
    </a>

</div>

</body>
</html>
