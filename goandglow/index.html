<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrolling Story</title>

<style>
    body {
        margin: 0;
        background-color: black;
    }

    .section {
        width: 100%;
        height: 100vh;
        position: relative;
    }

    /* ONLY background images */
    .bg-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background-color: black;
    }

    /* Logo (no black background applied) */
    .logo {
        position: absolute;
        top: 19%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 230px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="section">
    <img src="photos/pt1.png" class="bg-img">
</div>

<div class="section">
    <img src="photos/pt2.png" class="bg-img">
</div>

<div class="section">
    <img src="photos/pt3.png" class="bg-img">
</div>

<div class="section">
    <img src="photos/pt4.png" class="bg-img">
</div>

<div class="section">
    <img src="photos/pt5.png" class="bg-img">
</div>

<div class="section">
    <img src="photos/pt6.png" class="bg-img">
</div>

<!-- Last section -->
<div class="section">
    <img src="photos/pt7.png" class="bg-img">

    <a href="https://ift.tt/snliN5j" target="_blank">
        <img src="photos/logo.png" class="logo">
    </a>
</div>

</body>
</html>
